server.port=8080
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# CockroachDB (Postgres wire). URL + username are non-secret defaults; password comes from env.
spring.datasource.url=${DB_URL:jdbc:postgresql://172.17.0.1:26257,cockroach-sw.albireo.me:26257,cockroach-pg.albireo.me:26257,cockroach-us-east.albireo.me:26257/example?sslmode=require}
spring.datasource.username=${DB_USER:example_app}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
# Don't crash on boot if the DB is briefly unreachable (multi-host URL handles failover).
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.maximum-pool-size=5
